<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食品二维码溯源系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a5f4a 0%, #0d3d2e 50%, #1a4a3a 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 680px; margin: 0 auto; }
    
    .header {
      background: linear-gradient(135deg, #ffffff 0%, #f8fffe 100%);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      margin-bottom: 20px;
    }
    .header-icon { font-size: 48px; margin-bottom: 12px; }
    .header h1 { color: #1a5f4a; font-size: 26px; margin-bottom: 8px; font-weight: 700; }
    .header p { color: #5a7a6a; font-size: 14px; }
    .header-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e8f5f0;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: #1a5f4a; }
    .stat-label { font-size: 12px; color: #7a9a8a; margin-top: 4px; }

    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      margin-bottom: 16px;
    }
    
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .section-title h2 { color: #1e293b; font-size: 20px; }
    .section-title span { color: #64748b; font-size: 14px; }
    
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .product-card {
      background: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 100%);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
      border-color: #1a5f4a;
    }
    .product-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .product-icon { font-size: 36px; }
    .product-badge {
      background: #dcfce7;
      color: #166534;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .product-name { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .product-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
    }
    .meta-icon { font-size: 14px; }
    .product-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 25px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1a5f4a 0%, #0d3d2e 100%);
      color: white;
    }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(26,95,74,0.3); }
    .btn-secondary {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
    }
    .btn-secondary:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
    .btn-icon { font-size: 14px; }

    .qrcode-panel {
      margin-top: 16px;
      padding: 20px;
      background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 12px;
      border: 2px dashed #cbd5e1;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .qrcode-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .qrcode-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .qrcode-title { font-size: 15px; font-weight: 600; color: #334155; }
    .qrcode-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #fee2e2;
      color: #dc2626;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qrcode-img {
      width: 180px;
      height: 180px;
      display: block;
      margin: 0 auto;
      padding: 12px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .qrcode-link {
      margin-top: 16px;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 8px;
      font-size: 12px;
      color: #64748b;
      text-align: center;
      word-break: break-all;
      font-family: monospace;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 20px;
      border-bottom: 2px solid #e8f5f0;
      margin-bottom: 24px;
    }
    .detail-title { flex: 1; }
    .detail-icon { font-size: 48px; margin-bottom: 12px; }
    .detail-title h2 { font-size: 26px; color: #1e293b; margin-bottom: 8px; font-weight: 700; }
    .detail-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      background: #dcfce7;
      color: #166534;
      font-size: 14px;
      font-weight: 600;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #1a5f4a;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 16px;
      background: #e8f5f0;
      border-radius: 25px;
      transition: all 0.2s;
    }
    .back-btn:hover { background: #d1fae5; }

    .info-section { margin-bottom: 24px; }
    .info-section h3 {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      color: #1a5f4a;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #d1fae5;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .info-card {
      background: #f8fafc;
      padding: 14px;
      border-radius: 12px;
    }
    .info-label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .info-value { font-size: 14px; color: #1e293b; font-weight: 600; }

    .timeline-container {
      background: #f8fafc;
      border-radius: 16px;
      padding: 20px;
    }
    .timeline {
      list-style: none;
      position: relative;
      padding-left: 30px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #1a5f4a, #0d3d2e);
      border-radius: 2px;
    }
    .timeline li {
      position: relative;
      padding: 12px 0;
      padding-left: 20px;
      color: #374151;
      font-size: 14px;
    }
    .timeline li::before {
      content: '';
      position: absolute;
      left: -26px;
      top: 16px;
      width: 14px;
      height: 14px;
      background: #1a5f4a;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 0 3px #1a5f4a;
    }
    .timeline li:last-child::before {
      background: #22c55e;
      box-shadow: 0 0 0 3px #22c55e;
    }
    .timeline-date {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .conclusion-box {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border-left: 5px solid #1a5f4a;
      padding: 18px 20px;
      border-radius: 0 12px 12px 0;
      color: #166534;
      font-size: 14px;
      line-height: 1.7;
    }
    .conclusion-icon { font-size: 18px; margin-right: 8px; }

    .footer {
      text-align: center;
      padding: 24px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }
    .footer a { color: rgba(255,255,255,0.9); text-decoration: none; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #1a5f4a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      text-align: center;
      padding: 40px 20px;
    }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-text { color: #dc2626; font-size: 16px; margin-bottom: 16px; }

    @media (max-width: 480px) {
      .header { padding: 24px 16px; }
      .header h1 { font-size: 22px; }
      .header-stats { gap: 20px; }
      .stat-value { font-size: 20px; }
      .product-grid { grid-template-columns: 1fr; }
      .info-grid { grid-template-columns: 1fr; }
      .product-actions { flex-direction: column; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">🔍</div>
      <h1>食品二维码溯源系统</h1>
      <p>扫码查看食品生产、检测与物流信息</p>
      <div class="header-stats">
        <div class="stat-item">
          <div class="stat-value" id="product-count">0</div>
          <div class="stat-label">可溯源产品</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">100%</div>
          <div class="stat-label">检测合格率</div>
        </div>
      </div>
    </div>
    
    <div id="app">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>正在加载溯源信息...</p>
      </div>
    </div>
    
    <div class="footer">
      <p>基于 GitHub Pages 部署的食品溯源系统</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    const app = document.getElementById('app');

    const productIcons = {
      'VEG202605003': '🥬',
      'MEAT202605004': '🥩',
      'EGG202605005': '🥚',
      'GRAIN202605006': '🍚',
      'NOODLE202605007': '🍜'
    };

    async function loadProducts() {
      const response = await fetch('products.json');
      return await response.json();
    }

    function getBaseUrl() {
      const loc = window.location.href;
      return loc.split('?')[0];
    }

    async function showProductList(products) {
      document.getElementById('product-count').textContent = products.length;
      
      app.innerHTML = `
        <div class="card">
          <div class="section-title">
            <h2>📦 产品列表</h2>
            <span>点击卡片查看详情或生成二维码</span>
          </div>
          <div class="product-grid">
            ${products.map(product => `
              <div class="product-card" onclick="location.href='?id=${product.id}'">
                <div class="product-card-header">
                  <span class="product-icon">${productIcons[product.id] || '📦'}</span>
                  <span class="product-badge">${product.testResult}</span>
                </div>
                <div class="product-name">${product.name}</div>
                <div class="product-meta">
                  <div class="meta-item"><span class="meta-icon">📋</span> ${product.id}</div>
                  <div class="meta-item"><span class="meta-icon">📍</span> ${product.origin}</div>
                  <div class="meta-item"><span class="meta-icon">📅</span> ${product.date}</div>
                </div>
                <div class="product-actions" onclick="event.stopPropagation();">
                  <a href="?id=${product.id}" class="btn btn-primary">
                    <span class="btn-icon">🔍</span> 查看详情
                  </a>
                  <button onclick="toggleQrcode('${product.id}')" class="btn btn-secondary">
                    <span class="btn-icon">📱</span> 生成二维码
                  </button>
                </div>
                <div class="qrcode-panel" id="qrcode-${product.id}">
                  <div class="qrcode-header">
                    <span class="qrcode-title">📱 扫码溯源</span>
                    <button class="qrcode-close" onclick="event.stopPropagation(); toggleQrcode('${product.id}')">×</button>
                  </div>
                  <img class="qrcode-img" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(getBaseUrl() + '?id=' + product.id)}" alt="二维码">
                  <div class="qrcode-link">${getBaseUrl()}?id=${product.id}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function toggleQrcode(productId) {
      const panel = document.getElementById(`qrcode-${productId}`);
      panel.classList.toggle('active');
    }

    async function showProductDetail(product) {
      const icon = productIcons[product.id] || '📦';
      
      app.innerHTML = `
        <div class="card">
          <div class="detail-header">
            <div class="detail-title">
              <div class="detail-icon">${icon}</div>
              <h2>${product.name}</h2>
              <span class="detail-status">
                <span>✓</span> 检测结果：${product.testResult}
              </span>
            </div>
            <a href="?" class="back-btn">
              <span>←</span> 返回列表
            </a>
          </div>
          
          <div class="info-section">
            <h3><span>📋</span> 基本信息</h3>
            <div class="info-grid">
              <div class="info-card">
                <div class="info-label">产品编号</div>
                <div class="info-value">${product.id}</div>
              </div>
              <div class="info-card">
                <div class="info-label">生产批次</div>
                <div class="info-value">${product.batch}</div>
              </div>
              <div class="info-card">
                <div class="info-label">产地</div>
                <div class="info-value">${product.origin}</div>
              </div>
              <div class="info-card">
                <div class="info-label">生产日期</div>
                <div class="info-value">${product.date}</div>
              </div>
              <div class="info-card">
                <div class="info-label">保质期</div>
                <div class="info-value">${product.shelfLife}</div>
              </div>
              <div class="info-card">
                <div class="info-label">生产企业</div>
                <div class="info-value">${product.producer}</div>
              </div>
            </div>
          </div>
          
          <div class="info-section">
            <h3><span>🔬</span> 检测信息</h3>
            <div class="info-grid">
              <div class="info-card">
                <div class="info-label">检测机构</div>
                <div class="info-value">${product.testOrg}</div>
              </div>
              <div class="info-card">
                <div class="info-label">检测结果</div>
                <div class="info-value" style="color: #166534;">${product.testResult}</div>
              </div>
            </div>
          </div>
          
          <div class="info-section">
            <h3><span>📦</span> 物流时间轴</h3>
            <div class="timeline-container">
              <ul class="timeline">
                ${product.logistics.map(item => {
                  const parts = item.split(' ');
                  const date = parts[0];
                  const desc = parts.slice(1).join(' ');
                  return `<li><div>${desc}</div><div class="timeline-date">${date}</div></li>`;
                }).join('')}
              </ul>
            </div>
          </div>
          
          <div class="info-section">
            <h3><span>✅</span> 溯源结论</h3>
            <div class="conclusion-box">
              <span class="conclusion-icon">✓</span>${product.conclusion}
            </div>
          </div>
          
          <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #e8f5f0;">
            <button onclick="toggleDetailQrcode()" class="btn btn-secondary" style="margin-right: 12px;">
              <span class="btn-icon">📱</span> 生成溯源二维码
            </button>
            <a href="?" class="btn btn-primary">
              <span class="btn-icon">🏠</span> 返回产品列表
            </a>
          </div>
          
          <div class="qrcode-panel" id="detail-qrcode" style="margin-top: 20px; display: none;">
            <div class="qrcode-header">
              <span class="qrcode-title">📱 扫码查看 "${product.name}" 溯源信息</span>
              <button class="qrcode-close" onclick="toggleDetailQrcode()">×</button>
            </div>
            <img class="qrcode-img" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(getBaseUrl() + '?id=' + product.id)}" alt="二维码">
            <div class="qrcode-link">${getBaseUrl()}?id=${product.id}</div>
          </div>
        </div>
      `;
    }

    function toggleDetailQrcode() {
      const panel = document.getElementById('detail-qrcode');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    async function init() {
      try {
        const products = await loadProducts();
        
        if (!productId) {
          showProductList(products);
        } else {
          const product = products.find(p => p.id === productId);
          if (product) {
            showProductDetail(product);
          } else {
            app.innerHTML = `
              <div class="card">
                <div class="error">
                  <div class="error-icon">❌</div>
                  <div class="error-text">未找到该产品信息</div>
                  <a href="?" class="btn btn-primary">
                    <span class="btn-icon">←</span> 返回产品列表
                  </a>
                </div>
              </div>
            `;
          }
        }
      } catch (error) {
        app.innerHTML = `
          <div class="card">
            <div class="error">
              <div class="error-icon">⚠️</div>
              <div class="error-text">数据加载失败，请检查网络连接</div>
              <button onclick="location.reload()" class="btn btn-primary">
                <span class="btn-icon">↻</span> 重新加载
              </button>
            </div>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
